apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: demo.rules
      rules:
        - alert: DemoWebhookTest
          expr: vector(1) > 0
          for: 0m
          labels: { severity: warning, team: demo }
          annotations:
            summary: "Alerta de teste do webhook"
            description: "Esse alerta sempre dispara — serve para provar que a cadeia Prometheus → Alertmanager → Bridge → Chat está funcionando."

        - alert: NenhumUsuarioLogado
          expr: app_logged_in_users < 1
          for: 1m
          labels: { severity: warning, team: produto }
          annotations:
            summary: "Nenhum usuário logado"
            description: "A métrica app_logged_in_users está em 0 há mais de 1 minuto. Pode indicar queda no frontend ou problema no fluxo de login."

        - alert: AltaTaxaCadastros
          expr: rate(app_user_registrations_total[5m]) > 0.5
          for: 0m
          labels: { severity: info, team: produto }
          annotations:
            summary: "Pico de novos cadastros"
            description: "Taxa de cadastros acima de 0.5/s nos últimos 5 minutos — possível campanha ou evento de tráfego."
