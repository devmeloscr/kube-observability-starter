alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "bridge"
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
      routes:
        - matchers: ['alertname="Watchdog"']
          receiver: "null"
        - matchers: ['severity="critical"']
          receiver: "bridge"
    receivers:
      - name: "null"
      - name: "bridge"
        webhook_configs:
          - url: "http://alert-bridge.monitoring.svc:8080/alert"
            send_resolved: true
